<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Numbers Marketplace</title><style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6fb;
}

header{
background:linear-gradient(135deg,#2563eb,#1e40af);
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.apps{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
margin-top:20px;
}

.app-btn{
background:#2563eb;
color:white;
padding:15px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.number-card{
background:white;
padding:18px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.hidden{
display:none;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}
</style></head><body><header>
<h1>Premium Mobile Numbers Store</h1>
<p>Choose App → Buy Numbers Instantly</p>
</header><div class="container"><!-- SIGNUP --><div id="signupPage" class="card">
<h2>Create Account</h2>
<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
</div><!-- MAIN SITE --><div id="mainSite" class="hidden"><h2>Select App</h2><div class="apps">
<button class="app-btn" onclick="showNumbers('WhatsApp')">WhatsApp</button>
<button class="app-btn" onclick="showNumbers('Facebook')">Facebook</button>
<button class="app-btn" onclick="showNumbers('Telegram')">Telegram</button>
<button class="app-btn" onclick="showNumbers('Instagram')">Instagram</button>
</div><div id="numbersSection" class="hidden">
<h2 id="appTitle"></h2>
<div id="numbersGrid" class="grid"></div>
</div></div></div><script>
function signup(){
let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(name === "" || email === "" || password === ""){
alert("Fill all fields");
return;
}

localStorage.setItem("user", "yes");

document.getElementById("signupPage").style.display = "none";
document.getElementById("mainSite").classList.remove("hidden");
}

window.onload = function(){
if(localStorage.getItem("user")){
document.getElementById("signupPage").style.display = "none";
document.getElementById("mainSite").classList.remove("hidden");
}
}

function showNumbers(app){
document.getElementById("numbersSection").classList.remove("hidden");
document.getElementById("appTitle").innerText = app + " Available Numbers";

let grid = document.getElementById("numbersGrid");
grid.innerHTML = "";

for(let i=0;i<100;i++){
let number = "+1 36" + Math.floor(Math.random()*9000000 + 1000000);

grid.innerHTML += `
<div class="number-card">
<h3>${number}</h3>
<p>${app} Ready Number</p>
<button onclick="buy('${number}','${app}')">Buy</button>
</div>
`;
}
}

function buy(number,app){
let msg = "Hello, I want to buy this " + app + " number: " + number;
window.open("https://wa.me/13673334412?text=" + encodeURIComponent(msg));
}
</script></body>
</html><!DOCTYPE html><html lang="en">
