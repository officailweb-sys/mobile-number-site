<!DOCTYPE html>
<html>
<head>
<title>Virtual Number - Signup</title>
<style>
body{
font-family: Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
</div>

<script>
function signup(){
window.location.href="dashboard.html";
}
</script>

</body>
</html>
